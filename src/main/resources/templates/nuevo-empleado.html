<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <th:block th:replace="~{layout :: head-assets}" />
    <title>Nuevo Empleado — Sistema de Planillas ADOC</title>
</head>
<body>

    <!-- ═══ Sidebar ═══ -->
    <nav th:replace="~{layout :: sidebar('nuevoEmpleado')}"></nav>

    <!-- ═══ Main Area ═══ -->
    <div class="main-area">

        <!-- ═══ Header ═══ -->
        <header th:replace="~{layout :: header}"></header>

        <!-- ═══ Content ═══ -->
        <main class="content-area">

            <div class="page-header-actions" style="margin-bottom: 1.75rem;">
                <h1 class="page-title">Registrar Nuevo Empleado</h1>
                <p class="page-subtitle" style="margin-bottom: 0;">Complete la información requerida para dar de alta a un nuevo empleado</p>
            </div>

            <div class="card animate-in">
                <div class="card-body">
                    <form th:action="@{/empleados/nuevo}" th:object="${empleado}" method="post" class="form-grid">
                        
                        <!-- ─── Bloque: Datos Personales ─── -->
                        <div class="form-section">
                            <h3 class="section-title">Datos Personales</h3>
                            <div class="row">
                                <div class="col-md-6 form-group">
                                    <label for="nombres">Nombres</label>
                                    <input type="text" class="form-control" id="nombres" th:field="*{nombres}" required>
                                </div>
                                <div class="col-md-6 form-group">
                                    <label for="apellidos">Apellidos</label>
                                    <input type="text" class="form-control" id="apellidos" th:field="*{apellidos}" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-12 form-group">
                                    <label for="direccion">Dirección</label>
                                    <input type="text" class="form-control" id="direccion" th:field="*{direccion}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 form-group">
                                    <label for="dui">DUI</label>
                                    <input type="text" class="form-control" id="dui" th:field="*{dui}" required>
                                </div>
                                <div class="col-md-4 form-group">
                                    <label for="nit">NIT</label>
                                    <input type="text" class="form-control" id="nit" th:field="*{nit}" required>
                                </div>
                                <div class="col-md-4 form-group">
                                    <label for="telefono">Teléfono</label>
                                    <input type="text" class="form-control" id="telefono" th:field="*{telefono}">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 form-group">
                                    <label for="fechaNacimiento">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" id="fechaNacimiento" th:field="*{fechaNacimiento}">
                                </div>
                            </div>
                        </div>

                        <!-- ─── Bloque: Datos Laborales ─── -->
                        <div class="form-section" style="margin-top: 2rem;">
                            <h3 class="section-title">Datos Laborales</h3>
                            <div class="row">
                                <div class="col-md-6 form-group">
                                    <label for="cargo">Cargo</label>
                                    <input type="text" class="form-control" id="cargo" th:field="*{cargo}" required>
                                </div>
                                <div class="col-md-6 form-group">
                                    <label for="departamento">Departamento</label>
                                    <input type="text" class="form-control" id="departamento" th:field="*{departamento}" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-4 form-group">
                                    <label for="fechaIngreso">Fecha de Ingreso</label>
                                    <input type="date" class="form-control" id="fechaIngreso" th:field="*{fechaIngreso}" required>
                                </div>
                                <div class="col-md-4 form-group">
                                    <label for="tipoContrato">Tipo de Contrato</label>
                                    <input type="text" class="form-control" id="tipoContrato" th:field="*{tipoContrato}">
                                </div>
                                <div class="col-md-4 form-group">
                                    <label for="salarioBase">Salario Mensual ($)</label>
                                    <input type="number" step="0.01" class="form-control" id="salarioBase" th:field="*{salarioBase}" required>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 form-group">
                                    <label for="tipoJornada">Tipo de Jornada</label>
                                    <select class="form-control" id="tipoJornada" th:field="*{tipoJornada}" required>
                                        <option th:each="jornada : ${tiposJornada}" 
                                                th:value="${jornada}" 
                                                th:text="${jornada == T(com.adoc.rrhh.entity.enums.TipoJornada).DIURNA ? 'Diurna' : 'Nocturna'}">
                                        </option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions" style="margin-top: 2rem; display: flex; justify-content: flex-end;">
                            <button type="submit" class="btn-action" style="width: auto; padding: 0.8rem 2rem;">
                                Guardar Empleado
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
