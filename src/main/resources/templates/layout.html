<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<!--
    ═══════════════════════════════════════════════════════════════
    ADOC — Layout Fragment Library
    Fragmentos reutilizables: sidebar, header, head-assets
    ═══════════════════════════════════════════════════════════════
-->

<!-- ═══ HEAD ASSETS ════════════════════════════════════════════════ -->
<head th:fragment="head-assets">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.12/dist/sweetalert2.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.12/dist/sweetalert2.all.min.js"></script>
    <link th:href="@{/css/layout.css}" rel="stylesheet">
</head>

<body>

<!-- ═══ SIDEBAR ════════════════════════════════════════════════════ -->
<nav th:fragment="sidebar(currentPage)" class="sidebar">

    <!-- Logo -->
    <div class="sidebar-logo">
        <div class="sidebar-logo-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 16l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z"/>
            </svg>
        </div>
        <div class="sidebar-logo-text">
            <span class="logo-title">ADOC Planillas</span>
            <span class="logo-subtitle">Gestión RRHH</span>
        </div>
    </div>

    <!-- Navigation -->
    <div class="sidebar-nav">
        <div class="nav-section-label">Principal</div>

        <!-- Inicio -->
        <a th:href="@{/}" class="nav-item" th:classappend="${currentPage == 'inicio'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
            </svg>
            Inicio
        </a>

        <div class="nav-section-label">Empleados</div>

        <!-- Empleados -->
        <a th:href="@{/empleados}" class="nav-item" th:classappend="${currentPage == 'empleados'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
            </svg>
            Empleados
        </a>

        <!-- Nuevo Empleado -->
        <a th:href="@{/empleados/nuevo}" class="nav-item" th:classappend="${currentPage == 'nuevoEmpleado'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm-9-2V7H4v3H1v2h3v3h2v-3h3v-2H6zm9 4c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
            Nuevo Empleado
        </a>

        <div class="nav-section-label">Control de Personal</div>

        <!-- Ausencias e Incapacidades -->
        <a th:href="@{/ausencias}" class="nav-item" th:classappend="${currentPage == 'ausencias'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
            </svg>
            Ausencias
        </a>

        <!-- Registrar Ausencia -->
        <a th:href="@{/ausencias/nueva}" class="nav-item" th:classappend="${currentPage == 'nuevaAusencia'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/>
            </svg>
            Registrar Ausencia
        </a>

        <div class="nav-section-label">Planilla</div>

        <!-- Gestionar Planilla -->
        <a th:href="@{/planillas}" class="nav-item" th:classappend="${currentPage == 'planillas'} ? 'active'">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 10h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
            </svg>
            Gestionar Planilla
        </a>
    </div>

    <!-- Footer / Logout -->
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="nav-item">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
            </svg>
            Cerrar Sesión
        </a>
    </div>
</nav>

<header th:fragment="header" class="top-header">
    <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')" aria-label="Abrir menú">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
        </svg>
    </button>
    <div class="header-user">
        <div class="header-user-info">
            <span class="header-user-name">Recursos Humanos</span>
            <span class="header-user-role">Administrador</span>
        </div>
        <div class="header-avatar">RH</div>
    </div>
</header>

</body>
</html>
