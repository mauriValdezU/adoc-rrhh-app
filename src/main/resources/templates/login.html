<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistema de Gestión de Planillas ADOC - Inicio de sesión">
    <title>Login — Sistema de Planillas ADOC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Base ─────────────────────────────────────────── */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f3f6f9;
            color: #333333;
            min-height: 100vh;
            display: flex;
        }

        /* ─── Layout: Two-panel split ──────────────────────────────── */
        .login-wrapper {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* ─── Left Panel: Branding ─────────────────────────────────── */
        .brand-panel {
            flex: 0 0 42%;
            background: linear-gradient(160deg, #1e1e2d 0%, #2a2a40 50%, #1e1e2d 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .brand-panel::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(200, 16, 46, 0.12) 0%, transparent 60%);
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.15); opacity: 1; }
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .brand-logo {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #C8102E 0%, #e0243f 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            box-shadow: 0 12px 40px rgba(200, 16, 46, 0.35);
            animation: floatIn 0.8s ease-out;
        }

        .brand-logo svg {
            width: 48px;
            height: 48px;
            fill: #ffffff;
        }

        @keyframes floatIn {
            from { opacity: 0; transform: translateY(20px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-title {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.75rem;
            animation: fadeUp 0.8s ease-out 0.2s both;
        }

        .brand-subtitle {
            color: rgba(255, 255, 255, 0.55);
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.6;
            max-width: 320px;
            animation: fadeUp 0.8s ease-out 0.4s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-decorators {
            position: absolute;
            bottom: 2.5rem;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 8px;
            z-index: 1;
        }

        .decorator-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.12);
        }

        .decorator-dot.active {
            background: #C8102E;
            box-shadow: 0 0 12px rgba(200, 16, 46, 0.5);
        }

        /* ─── Right Panel: Form ────────────────────────────────────── */
        .form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            animation: slideIn 0.6s ease-out 0.3s both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-card h1 {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1e1e2d;
            margin-bottom: 0.5rem;
        }

        .login-card .welcome-text {
            color: #888;
            font-size: 0.925rem;
            margin-bottom: 2rem;
        }

        /* ─── Alert ────────────────────────────────────────────────── */
        .alert-error {
            background: rgba(200, 16, 46, 0.08);
            border: 1px solid rgba(200, 16, 46, 0.25);
            border-left: 4px solid #C8102E;
            color: #C8102E;
            padding: 0.85rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 1.5rem;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        /* ─── Form elements ────────────────────────────────────────── */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #555;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: #aaa;
            transition: fill 0.25s ease;
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.75rem;
            border: 2px solid #e2e6ea;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #333333;
            background: #ffffff;
            transition: all 0.25s ease;
            outline: none;
        }

        .form-input::placeholder {
            color: #bbb;
        }

        .form-input:focus {
            border-color: #C8102E;
            box-shadow: 0 0 0 4px rgba(200, 16, 46, 0.1);
        }

        .form-input:focus ~ .input-icon,
        .form-input:focus + .input-icon {
            fill: #C8102E;
        }

        /* ─── Submit button ────────────────────────────────────────── */
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #C8102E 0%, #a00d24 100%);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(200, 16, 46, 0.3);
            margin-top: 0.75rem;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #a00d24 0%, #8a0b1f 100%);
            box-shadow: 0 6px 24px rgba(200, 16, 46, 0.4);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(200, 16, 46, 0.3);
        }

        /* ─── Footer ──────────────────────────────────────────────── */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            color: #aaa;
            font-size: 0.8rem;
        }

        /* ─── Responsive ──────────────────────────────────────────── */
        @media (max-width: 900px) {
            .brand-panel {
                display: none;
            }

            .form-panel {
                padding: 2rem 1.5rem;
            }

            .login-card h1 {
                font-size: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .login-card {
                max-width: 100%;
            }

            .form-input {
                padding: 0.75rem 1rem 0.75rem 2.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">

        <!-- ─── Left: Branding Panel ──────────────────────────────── -->
        <div class="brand-panel">
            <div class="brand-content">
                <div class="brand-logo">
                    <!-- Payroll / Shield icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 16l-4-4 1.41-1.41L11 14.17l6.59-6.59L19 9l-8 8z"/>
                    </svg>
                </div>
                <h2 class="brand-title">ADOC Planillas</h2>
                <p class="brand-subtitle">
                    Sistema integral de gestión de planillas y recursos humanos
                </p>
            </div>
            <div class="brand-decorators">
                <span class="decorator-dot active"></span>
                <span class="decorator-dot"></span>
                <span class="decorator-dot"></span>
            </div>
        </div>

        <!-- ─── Right: Login Form ─────────────────────────────────── -->
        <div class="form-panel">
            <div class="login-card">
                <h1>Iniciar Sesión</h1>
                <p class="welcome-text">Ingresa tus credenciales para acceder al sistema</p>

                <!-- Error alert -->
                <div th:if="${error}" class="alert-error" role="alert" th:text="${error}">
                </div>

                <form th:action="@{/login}" method="post" id="loginForm">
                    <div class="form-group">
                        <label for="username">Usuario</label>
                        <div class="input-wrapper">
                            <input type="text"
                                   class="form-input"
                                   id="username"
                                   name="username"
                                   placeholder="Ingresa tu usuario"
                                   required
                                   autocomplete="username">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <input type="password"
                                   class="form-input"
                                   id="password"
                                   name="password"
                                   placeholder="Ingresa tu contraseña"
                                   required
                                   autocomplete="current-password">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z"/>
                            </svg>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="btnLogin">
                        Ingresar al Sistema
                    </button>
                </form>

                <div class="login-footer">
                    &copy; 2026 ADOC — Sistema de Planillas
                </div>
            </div>
        </div>

    </div>
</body>
</html>
